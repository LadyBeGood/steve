<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Only 3D Minecraft Steve</title>
</head>

<body>
    <div class="hover-area">
        <div class="x1y1"></div>
        <div class="x1y2"></div>
        <div class="x1y3"></div>
        <div class="x1y4"></div>
        <div class="x1y5"></div>
        <div class="x2y1"></div>
        <div class="x2y2"></div>
        <div class="x2y3"></div>
        <div class="x2y4"></div>
        <div class="x2y5"></div>
        <div class="x3y1"></div>
        <div class="x3y2"></div>
        <div class="x3y3"></div>
        <div class="x3y4"></div>
        <div class="x3y5"></div>
        <div class="x4y1"></div>
        <div class="x4y2"></div>
        <div class="x4y3"></div>
        <div class="x4y4"></div>
        <div class="x4y5"></div>
        <div class="x5y1"></div>
        <div class="x5y2"></div>
        <div class="x5y3"></div>
        <div class="x5y4"></div>
        <div class="x5y5"></div>

        <div class="steve">
            <div class="cube head">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="cube torso">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face bottom"></div>
            </div>

            <div class="cube arm left-arm">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>
            
            <div class="cube arm right-arm">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="cube leg left-leg">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>
            
            <div class="cube leg right-leg">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face right"></div>
                <div class="face bottom"></div>
            </div>
        </div>
    </div>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100svh;
            display: grid;
            place-items: center;
            /* cursor: url("./golden-apple-80x80.webp") 40 40, auto; */
        }
    
        .hover-area {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            z-index: 100;
    
            .x1y1:hover~.steve {
                transform: rotateX(15deg) rotateY(-35deg);
            }
    
            .x1y2:hover~.steve {
                transform: rotateX(15deg) rotateY(-15deg);
            }
    
            .x1y3:hover~.steve {
                transform: rotateX(15deg) rotateY(0deg);
            }
    
            .x1y4:hover~.steve {
                transform: rotateX(15deg) rotateY(15deg);
            }
    
            .x1y5:hover~.steve {
                transform: rotateX(15deg) rotateY(35deg);
            }
    
            .x2y1:hover~.steve {
                transform: rotateX(5deg) rotateY(-35deg);
            }
    
            .x2y2:hover~.steve {
                transform: rotateX(5deg) rotateY(-15deg);
            }
    
            .x2y3:hover~.steve {
                transform: rotateX(5deg) rotateY(0deg);
            }
    
            .x2y4:hover~.steve {
                transform: rotateX(5deg) rotateY(15deg);
            }
    
            .x2y5:hover~.steve {
                transform: rotateX(5deg) rotateY(35deg);
            }
    
            .x3y1:hover~.steve {
                transform: rotateX(-10deg) rotateY(-35deg);
            }
    
            .x3y2:hover~.steve {
                transform: rotateX(-10deg) rotateY(-15deg);
            }
    
            .x3y3:hover~.steve {
                transform: rotateX(-10deg) rotateY(0deg);
            }
    
            .x3y4:hover~.steve {
                transform: rotateX(-10deg) rotateY(15deg);
            }
    
            .x3y5:hover~.steve {
                transform: rotateX(-10deg) rotateY(35deg);
            }
    
            .x4y1:hover~.steve {
                transform: rotateX(-20deg) rotateY(-35deg);
            }
    
            .x4y2:hover~.steve {
                transform: rotateX(-20deg) rotateY(-15deg);
            }
    
            .x4y3:hover~.steve {
                transform: rotateX(-20deg) rotateY(0deg);
            }
    
            .x4y4:hover~.steve {
                transform: rotateX(-20deg) rotateY(15deg);
            }
    
            .x4y5:hover~.steve {
                transform: rotateX(-20deg) rotateY(35deg);
            }
    
            .x5y1:hover~.steve {
                transform: rotateX(-30deg) rotateY(-35deg);
            }
    
            .x5y2:hover~.steve {
                transform: rotateX(-30deg) rotateY(-15deg);
            }
    
            .x5y3:hover~.steve {
                transform: rotateX(-30deg) rotateY(0deg);
            }
    
            .x5y4:hover~.steve {
                transform: rotateX(-30deg) rotateY(15deg);
            }
    
            .x5y5:hover~.steve {
                transform: rotateX(-30deg) rotateY(35deg);
            }
        }
    
        .steve {
            --pupil: #473581;
            --hair: #3c2212;
            --skin: #c68967;
            --nose: #682b1f;
            --mouth: #c06661;
            --beard: #3c1811;
            --shirt: #00a3a3;
            --pant: #2241c4;
            --shoe: #505050;
            --hair-dark: #2c160b;
            --skin-dark: #a16d55;
            --shirt-dark: #008282;
            --pant-dark: #18309c;
            --shoe-dark: #3a3a3a;
    
            position: absolute;
            left: 50%;
            top: 50%;
            translate: -50% -50%;
            width: 200px;
            height: 400px;
            transform-style: preserve-3d;
            pointer-events: none;
            transition: transform 0.25s ease-out;
    
            .cube {
                position: absolute;
                transform-style: preserve-3d;
            }
    
            .face {
                position: absolute;
                box-sizing: border-box;
                image-rendering: pixelated;
            }
    
            .head {
                width: 80px;
                height: 80px;
                top: 40px;
                left: 60px;
    
                .face {
                    width: 80px;
                    height: 80px;
                }
    
                .front {
                    transform: translateZ(40px);
                    background:
                        /* Eyes */
                        linear-gradient(to right, white 10px, var(--pupil) 0 20px, transparent 20px) 10px 40px / 30px 10px,
                        linear-gradient(to right, transparent 10px, var(--pupil) 0 20px, white 0 30px, transparent 30px) 40px 40px / 30px 10px,
                        /* Nose */
                        linear-gradient(var(--nose)) 30px 50px / 20px 10px,
                        /* Mouth */
                        linear-gradient(var(--mouth)) 30px 60px / 20px 10px,
                        /* Beard */
                        linear-gradient(var(--beard)) 20px 60px / 10px 20px,
                        linear-gradient(var(--beard)) 50px 60px / 10px 20px,
                        linear-gradient(var(--beard)) 20px 70px / 40px 10px,
                        /* Hair */
                        linear-gradient(var(--hair)) 0px 0px / 80px 20px,
                        linear-gradient(var(--hair)) 0px 10px / 10px 20px,
                        linear-gradient(var(--hair)) 70px 10px / 10px 20px,
                        /* Skin */
                        var(--skin);
                    background-repeat: no-repeat;
                }
    
                .back {
                    transform: rotateY(180deg) translateZ(40px);
                    background: var(--hair);
                }
    
                .left {
                    transform: rotateY(-90deg) translateZ(40px);
                    background: 
                        linear-gradient(var(--skin-dark)) 0px 70px / 80px 10px,
                        linear-gradient(var(--skin-dark)) 30px 60px / 50px 20px,
                        linear-gradient(var(--skin-dark)) 50px 50px / 30px 20px,
                        linear-gradient(var(--skin-dark)) 50px 40px / 20px 20px,
                        var(--hair-dark);
                        background-repeat: no-repeat;
                    }
                    
                .right {
                    transform: rotateY(90deg) translateZ(40px);
                    background: 
                        linear-gradient(var(--skin-dark)) 0px 70px / 80px 10px,
                        linear-gradient(var(--skin-dark)) 0px 60px / 50px 20px,
                        linear-gradient(var(--skin-dark)) 0px 50px / 30px 20px,
                        linear-gradient(var(--skin-dark)) 10px 40px / 20px 20px,
                        var(--hair-dark);
                    background-repeat: no-repeat;
                }
    
                .top {
                    transform: rotateX(90deg) translateZ(40px);
                    background: var(--hair);
                }
    
                .bottom {
                    transform: rotateX(-90deg) translateZ(40px);
                    background: var(--skin-dark);
                }
            }
    
            .torso {
                width: 80px;
                height: 120px;
                top: 120px;
                left: 60px;
    
                .face {
                    width: 80px;
                    height: 120px;
                }
    
                .front {
                    transform: translateZ(20px);
                    background:
                    /* Chest */
                    linear-gradient(var(--skin)) 30px 0px / 20px 10px,
                    linear-gradient(var(--skin)) 20px 0px / 40px 5px,
                    var(--shirt);
                    background-repeat: no-repeat;
                }

                /* This face is not visible but is kept there to 
                   handle subpixel rendering issue around the untucked shirt */
                .bottom {
                    height: 40px;
                    transform: rotateX(-90deg) translateZ(100px);
                    background: linear-gradient(var(--shirt)) 60px 0px / 20px 40px;
                    background-repeat: no-repeat;
                }

                .left {
                    transform: rotateY(-90deg) translateZ(20px);
                    width: 40px;
                    background: var(--shirt-dark);
                }

                .right {
                    transform: rotateY(90deg) translateZ(60px);
                    width: 40px;
                    background: var(--shirt-dark);
                }

                .back {
                    transform: rotateY(180deg) translateZ(20px);
                    background: var(--shirt);
                }
            }
    
    
    
    
            .arm {
                width: 40px;
                height: 120px;
                top: 120px;
    
                .face {
                    width: 40px;
                    height: 120px;
                }
    
                .front {
                    transform: translateZ(20px);
                    background: linear-gradient(to bottom, var(--shirt) 60px, var(--skin) 60px);
                }

                .back {
                    transform: rotateY(180deg) translateZ(20px);
                    background: linear-gradient(to bottom, var(--shirt-dark) 60px, var(--skin-dark) 60px);
                }
    
                .left {
                    transform: rotateY(-90deg) translateZ(20px);
                    background: linear-gradient(to bottom, var(--shirt-dark) 60px, var(--skin-dark) 60px);
                }
    
                .right {
                    transform: rotateY(90deg) translateZ(20px);
                    background: linear-gradient(to bottom, var(--shirt-dark) 60px, var(--skin-dark) 60px);
                }
    
                .top {
                    height: 40px;
                    transform: rotateX(90deg) translateZ(20px);
                    background: var(--shirt);
                }
    
                .bottom {
                    height: 40px;
                    transform: rotateX(-90deg) translateZ(100px);
                    background: var(--skin-dark);
                }
    
                &.left-arm {
                    left: 20px;
    
                }
    
                &.right-arm {
                    left: 140px;
    
                }
            }
    
            .leg {
                width: 40px;
                height: 120px;
                top: 240px;
    
                .face {
                    width: 40px;
                    height: 120px;
                }
    
                .front {
                    transform: translateZ(20px);
                    background: linear-gradient(to bottom, var(--pant) 100px, var(--shoe) 100px);
                }

                .back {
                    transform: rotateY(180deg) translateZ(20px);
                    background: linear-gradient(to bottom, var(--pant-dark) 100px, var(--shoe-dark) 100px);
                }
    
                .left {
                    transform: rotateY(-90deg) translateZ(20px);
                    background: linear-gradient(to bottom, var(--pant-dark) 100px, var(--shoe-dark) 100px);
                }
    
                .right {
                    transform: rotateY(90deg) translateZ(20px);
                    background: linear-gradient(to bottom, var(--pant-dark) 100px, var(--shoe-dark) 100px);
                }
    
                .bottom {
                    height: 40px;
                    transform: rotateX(-90deg) translateZ(100px);
                    background: var(--shoe-dark);
                }
    
                &.left-leg {
                    left: 60px;
                }
    
                &.right-leg {
                    left: 100px;
    
                    .front {
                        background:
                            linear-gradient(var(--shirt)) 30px 0px / 10px 10px,
                            linear-gradient(var(--shirt)) 20px 0px / 20px 5px,
                            linear-gradient(to bottom, var(--pant) 100px, var(--shoe) 100px);
                        background-repeat: no-repeat;
                    }
                }
            }
        }
    </style>
</body>


</html>
