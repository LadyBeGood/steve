<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Only 3D Steve</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100svh;
            display: grid;
            place-items: center;
            perspective: 800px;
            cursor: url("./golden-apple-80x80.webp") 40 40, auto;
        }

        .grid-container {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            z-index: 100;
        }

        .steve {
            --pupil: #473581;
            --hair-dark: #2c160b;
            --skin: #c68967;
            --nose: #682b1f;
            --mouth: #3c1811;
            --shirt: #00a3a3;
            --pant: #2241c4;
            --shoe: #505050;
            --hair: #3c2212;
            --skin-dark: #a16d55;
            --shirt-dark: #008282;
            --pant-dark: #18309c;
            --shoe-dark: #3a3a3a;
            

            position: absolute;
            left: 50%;
            top: 50%;
            translate: -50% -50%;
            width: 200px;
            height: 400px;
            transform-style: preserve-3d;
            pointer-events: none;
            transition: transform 0.25s ease-out;
            transform: rotateX(-10deg) rotateY(0deg);
        }


        /* Row 1 (Top) */
        .r1c1:hover~.steve {
            transform: rotateX(15deg) rotateY(-35deg);
        }

        .r1c2:hover~.steve {
            transform: rotateX(15deg) rotateY(-15deg);
        }

        .r1c3:hover~.steve {
            transform: rotateX(15deg) rotateY(0deg);
        }

        .r1c4:hover~.steve {
            transform: rotateX(15deg) rotateY(15deg);
        }

        .r1c5:hover~.steve {
            transform: rotateX(15deg) rotateY(35deg);
        }

        /* Row 2 */
        .r2c1:hover~.steve {
            transform: rotateX(5deg) rotateY(-35deg);
        }

        .r2c2:hover~.steve {
            transform: rotateX(5deg) rotateY(-15deg);
        }

        .r2c3:hover~.steve {
            transform: rotateX(5deg) rotateY(0deg);
        }

        .r2c4:hover~.steve {
            transform: rotateX(5deg) rotateY(15deg);
        }

        .r2c5:hover~.steve {
            transform: rotateX(5deg) rotateY(35deg);
        }

        /* Row 3 (Center) */
        .r3c1:hover~.steve {
            transform: rotateX(-10deg) rotateY(-35deg);
        }

        .r3c2:hover~.steve {
            transform: rotateX(-10deg) rotateY(-15deg);
        }

        .r3c3:hover~.steve {
            transform: rotateX(-10deg) rotateY(0deg);
        }

        .r3c4:hover~.steve {
            transform: rotateX(-10deg) rotateY(15deg);
        }

        .r3c5:hover~.steve {
            transform: rotateX(-10deg) rotateY(35deg);
        }

        /* Row 4 */
        .r4c1:hover~.steve {
            transform: rotateX(-20deg) rotateY(-35deg);
        }

        .r4c2:hover~.steve {
            transform: rotateX(-20deg) rotateY(-15deg);
        }

        .r4c3:hover~.steve {
            transform: rotateX(-20deg) rotateY(0deg);
        }

        .r4c4:hover~.steve {
            transform: rotateX(-20deg) rotateY(15deg);
        }

        .r4c5:hover~.steve {
            transform: rotateX(-20deg) rotateY(35deg);
        }

        /* Row 5 (Bottom) */
        .r5c1:hover~.steve {
            transform: rotateX(-30deg) rotateY(-35deg);
        }

        .r5c2:hover~.steve {
            transform: rotateX(-30deg) rotateY(-15deg);
        }

        .r5c3:hover~.steve {
            transform: rotateX(-30deg) rotateY(0deg);
        }

        .r5c4:hover~.steve {
            transform: rotateX(-30deg) rotateY(15deg);
        }

        .r5c5:hover~.steve {
            transform: rotateX(-30deg) rotateY(35deg);
        }


        .cube {
            position: absolute;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        .head {
            width: 80px;
            height: 80px;
            top: 40px;
            left: 60px;
        }

        .head .face {
            width: 80px;
            height: 80px;
        }

        .head .front {
            transform: translateZ(40px);
        }

        .head .back {
            transform: rotateY(180deg) translateZ(40px);
            background: var(--hair);
        }

        .head .left {
            transform: rotateY(-90deg) translateZ(40px);
            background: var(--hair-dark);
        }

        .head .right {
            transform: rotateY(90deg) translateZ(40px);
            background: var(--hair-dark);
        }

        .head .top {
            transform: rotateX(90deg) translateZ(40px);
            background: var(--hair);
        }

        .head .bottom {
            transform: rotateX(-90deg) translateZ(40px);
            background: var(--skin-dark);
        }

        .head .front {
            background:
                /* Eyes (White & Blue) */
                linear-gradient(to right, white 10px, var(--pupil) 0 20px, transparent 20px) 10px 40px / 30px 10px,
                linear-gradient(to right, transparent 10px, var(--pupil) 0 20px, white 0 30px, transparent 30px) 40px 40px / 30px 10px,
                /* Nose & Mouth */
                linear-gradient(var(--nose)) 30px 50px / 20px 10px,
                linear-gradient(var(--mouth)) 20px 60px / 40px 10px,
                /* Hair overlay */
                linear-gradient(var(--hair), var(--hair)) 0px 0px / 80px 20px,
                linear-gradient(var(--hair), var(--hair)) 0px 20px / 10px 20px,
                linear-gradient(var(--hair), var(--hair)) 70px 20px / 10px 20px,
                /* Base Skin Tone */
                var(--skin);
            background-repeat: no-repeat;
        }

        .torso {
            width: 80px;
            height: 120px;
            top: 120px;
            left: 60px;
        }

        .torso .face {
            width: 80px;
            height: 120px;
        }

        .torso .top,
        .torso .bottom {
            height: 40px;
        }

        .torso .front {
            transform: translateZ(20px);
            background:
                linear-gradient(var(--skin)) 30px 0px / 20px 10px,
                /* Neck skin */
                linear-gradient(var(--skin)) 20px 0px / 10px 5px,
                linear-gradient(var(--skin)) 50px 0px / 10px 5px,
                var(--shirt);
            /* Teal Shirt */
            background-repeat: no-repeat;
        }

        .torso .back {
            transform: rotateY(180deg) translateZ(20px);
            background: var(--shirt);
        }

        .torso .left {
            transform: rotateY(-90deg) translateZ(40px);
            width: 40px;
            background: var(--shirt-dark);
        }

        .torso .right {
            transform: rotateY(90deg) translateZ(40px);
            width: 40px;
            background: var(--shirt-dark);
        }

        .torso .top {
            transform: rotateX(90deg) translateZ(20px);
            background: var(--shirt);
        }

        .torso .bottom {
            transform: rotateX(-90deg) translateZ(100px);
            background: black;
        }


        .arm {
            width: 40px;
            height: 120px;
            top: 120px;
        }

        .arm .face {
            width: 40px;
            height: 120px;
        }

        .arm .top,
        .arm .bottom {
            height: 40px;
        }

        .arm.left-arm {
            left: 20px;
        }

        .arm.right-arm {
            left: 140px;
        }

        .arm .face.side-design {
            background: linear-gradient(to bottom, var(--shirt) 60px, var(--skin) 60px);
        }

        .arm .face.side-design-dark {
            background: linear-gradient(to bottom, var(--shirt-dark) 60px, var(--skin-dark) 60px);
        }

        .arm .front {
            transform: translateZ(20px);
        }

        .arm .back {
            transform: rotateY(180deg) translateZ(20px);
        }

        .arm .left {
            transform: rotateY(-90deg) translateZ(20px);
        }

        .arm .right {
            transform: rotateY(90deg) translateZ(20px);
        }

        .arm .top {
            transform: rotateX(90deg) translateZ(20px);
            background: var(--shirt);
        }

        .arm .bottom {
            transform: rotateX(-90deg) translateZ(100px);
            background: var(--skin);
        }

        .leg {
            width: 40px;
            height: 120px;
            top: 240px;
        }

        .leg .face {
            width: 40px;
            height: 120px;
        }

        .leg .top,
        .leg .bottom {
            height: 40px;
        }

        .leg.left-leg {
            left: 60px;
        }

        .leg.right-leg {
            left: 100px;
        }

        .leg .face.leg-design {
            background: linear-gradient(to bottom, var(--pant) 100px, var(--shoe) 100px);
        }

        .leg .face.leg-design-dark {
            background: linear-gradient(to bottom, var(--pant-dark) 100px, var(--shoe-dark) 100px);
        }

        .leg .front {
            transform: translateZ(20px);
        }

        .leg .back {
            transform: rotateY(180deg) translateZ(20px);
        }

        .leg .left {
            transform: rotateY(-90deg) translateZ(20px);
        }

        .leg .right {
            transform: rotateY(90deg) translateZ(20px);
        }

        .leg .top {
            transform: rotateX(90deg) translateZ(20px);
            background: black;
        }

        .leg .bottom {
            transform: rotateX(-90deg) translateZ(100px);
            background: var(--shoe-dark);
        }
    </style>
</head>

<body>

    <div class="grid-container">
        <div class="r1c1"></div>
        <div class="r1c2"></div>
        <div class="r1c3"></div>
        <div class="r1c4"></div>
        <div class="r1c5"></div>
        <div class="r2c1"></div>
        <div class="r2c2"></div>
        <div class="r2c3"></div>
        <div class="r2c4"></div>
        <div class="r2c5"></div>
        <div class="r3c1"></div>
        <div class="r3c2"></div>
        <div class="r3c3"></div>
        <div class="r3c4"></div>
        <div class="r3c5"></div>
        <div class="r4c1"></div>
        <div class="r4c2"></div>
        <div class="r4c3"></div>
        <div class="r4c4"></div>
        <div class="r4c5"></div>
        <div class="r5c1"></div>
        <div class="r5c2"></div>
        <div class="r5c3"></div>
        <div class="r5c4"></div>
        <div class="r5c5"></div>

        <div class="steve">

            <div class="cube head">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="cube torso">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="cube arm left-arm">
                <div class="face front side-design"></div>
                <div class="face back side-design"></div>
                <div class="face left side-design-dark"></div>
                <div class="face right side-design-dark"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="cube arm right-arm">
                <div class="face front side-design"></div>
                <div class="face back side-design"></div>
                <div class="face left side-design-dark"></div>
                <div class="face right side-design-dark"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="cube leg left-leg">
                <div class="face front leg-design"></div>
                <div class="face back leg-design"></div>
                <div class="face left leg-design-dark"></div>
                <div class="face right leg-design-dark"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>

            <div class="cube leg right-leg">
                <div class="face front leg-design"></div>
                <div class="face back leg-design"></div>
                <div class="face left leg-design-dark"></div>
                <div class="face right leg-design-dark"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>
        </div>
    </div>

    <script type="module" defer>
        const response = await fetch("./apple.webp");
        const blob = await response.blob();

        const reader = new FileReader();

        reader.onloadend = () => {
            const base64data = reader.result; // This is the full data:image/gif;base64,... string

            // document.write(base64data)
        };
        reader.readAsDataURL(blob);
    </script>
</body>


</html>
